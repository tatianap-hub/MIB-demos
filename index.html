<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhereWear Prototype V1</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #111111;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }

    .card {
      max-width: 520px;
      padding: 40px 32px;
    }

    .agency-label {
      font-size: 14px;
      line-height: 1.4;
      color: #777777;
      margin-bottom: 14px;
      letter-spacing: 0.02em;
    }

    .agency-logo {
      width: 150px;
      height: auto;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 12px;
      font-weight: 600;
    }

    p {
      font-size: 18px;
      line-height: 1.45;
      color: #555555;
      margin-bottom: 28px;
    }

    a {
      display: inline-block;
      padding: 14px 24px;
      background: #111111;
      color: #ffffff;
      text-decoration: none;
      border-radius: 999px;
      font-size: 16px;
    }

    a:hover {
      background: #333333;
    }
  </style>
</head>

<body>
  <div class="card">

    <div class="agency-label">Prototype created by</div>

    <img 
      src="./miblogo.svg" 
      alt="Mouton in Black logo" 
      class="agency-logo"
    />

    <h1>WhereWear Prototype V1</h1>

    <p>
      Mouton in Black is happy to present you the first prototype.
    </p>

    <a href="https://www.figma.com/proto/UTYxFNzbpPzGeAH0c5lL05/WW-Prototype-1?page-id=0%3A1&node-id=1-2&p=f&viewport=-246%2C-326%2C0.44&t=cxNh8FU5M5t2L30u-1&scaling=scale-down&content-scaling=fixed&starting-point-node-id=1%3A2" target="_blank">
      Let's see
    </a>

  </div>
</body>
</html>
